<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect x="20" y="50" width="10" height="28" rx="5" fill="#00D2FF">
    <animate attributeName="height" values="28;50;28" dur="1s" repeatCount="indefinite" />
    <animate attributeName="y" values="50;39;50" dur="1s" repeatCount="indefinite" />
  </rect>
  <rect x="40" y="30" width="10" height="68" rx="5" fill="#00D2FF">
    <animate attributeName="height" values="68;30;68" dur="1.2s" repeatCount="indefinite" />
    <animate attributeName="y" values="30;49;30" dur="1.2s" repeatCount="indefinite" />
  </rect>
  <rect x="60" y="45" width="10" height="38" rx="5" fill="#00D2FF">
    <animate attributeName="height" values="38;80;38" dur="0.8s" repeatCount="indefinite" />
    <animate attributeName="y" values="45;24;45" dur="0.8s" repeatCount="indefinite" />
  </rect>
  <rect x="80" y="20" width="10" height="88" rx="5" fill="#00D2FF">
    <animate attributeName="height" values="88;40;88" dur="1.5s" repeatCount="indefinite" />
    <animate attributeName="y" values="20;44;20" dur="1.5s" repeatCount="indefinite" />
  </rect>
  <rect x="100" y="55" width="10" height="18" rx="5" fill="#00D2FF">
    <animate attributeName="height" values="18;60;18" dur="1.1s" repeatCount="indefinite" />
    <animate attributeName="y" values="55;34;55" dur="1.1s" repeatCount="indefinite" />
  </rect>
</svg>