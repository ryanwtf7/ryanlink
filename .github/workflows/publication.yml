name: Publication

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0, 1.0.1, 1.1.0) or bump type (patch, minor, major)'
        required: true
        type: string
        default: 'patch'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.22
          registry-url: https://registry.npmjs.org

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update npm
        run: npm i -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Bump version
        id: version
        run: |
          if [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            npm version ${{ inputs.version }} --no-git-tag-version
            echo "new_version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            NEW_VERSION=$(npm version ${{ inputs.version }} --no-git-tag-version | sed 's/v//')
            echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Build v${{ steps.version.outputs.new_version }}
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Publish v${{ steps.version.outputs.new_version }} to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit and tag
        run: |
          git add package.json package-lock.json
          git commit -m "chore: release v${{ steps.version.outputs.new_version }}"
          git tag "v${{ steps.version.outputs.new_version }}"
          git push origin master
          git push origin "v${{ steps.version.outputs.new_version }}"

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          release_name: Release v${{ steps.version.outputs.new_version }}
          body: |
            Release v${{ steps.version.outputs.new_version }}
            
            ## Installation
            
            ```bash
            npm install ryanlink@${{ steps.version.outputs.new_version }}
            ```
            
            See [README](https://github.com/ryanwtf7/ryanlink#readme) for documentation.
          draft: false
          prerelease: false
