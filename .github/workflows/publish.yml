name: Publication

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0, 1.0.1, 1.1.0) or bump type (patch, minor, major)'
        required: true
        type: string
        default: 'patch'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun.js
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: bun install

      - name: Bump version
        id: version
        run: |
          if [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            npm version ${{ inputs.version }} --no-git-tag-version
            echo "new_version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            NEW_VERSION=$(npm version ${{ inputs.version }} --no-git-tag-version | sed 's/v//')
            echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Build v${{ steps.version.outputs.new_version }}
        run: bun run build

      - name: Run tests
        run: bun run test

      - name: Publish v${{ steps.version.outputs.new_version }} to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit and tag
        run: |
          git add package.json
          git commit -m "chore: release v${{ steps.version.outputs.new_version }}"
          git tag "v${{ steps.version.outputs.new_version }}"
          git push origin master
          git push origin "v${{ steps.version.outputs.new_version }}"

      - name: Create Changelog
        id: changelog
        run: |
          # Get the previous tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --oneline -n 10)
          else
            CHANGELOG=$(git log ${PREVIOUS_TAG}..HEAD --oneline)
          fi
          # Escape for multiline output
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          name: Release v${{ steps.version.outputs.new_version }}
          body: |
            ## Release v${{ steps.version.outputs.new_version }}
            
            ### Changes
            ${{ steps.changelog.outputs.changelog }}

            ## Installation

            ```bash
            npm install ryanlink@${{ steps.version.outputs.new_version }}
            ```

            See [README](https://github.com/ryanwtf7/ryanlink#readme) for documentation.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Discord Notification
        if: success()
        run: |
          if [ -z "${{ secrets.WEBHOOK }}" ]; then
            echo "Skipping Discord notification (WEBHOOK not set)"
            exit 0
          fi
          
          PAYLOAD=$(cat <<EOF
          {
            "username": "Ryanlink CI",
            "avatar_url": "https://raw.githubusercontent.com/ryanwtf7/ryanlink/master/docs/assets/ryanlink.png",
            "embeds": [{
              "title": "📦 Ryanlink v${{ steps.version.outputs.new_version }} Published",
              "description": "**Successfully deployed to master and NPM.**\n\n### Changes\n\`\`\`\n${{ steps.changelog.outputs.changelog }}\n\`\`\`",
              "color": 54015,
              "fields": [
                { "name": "NPM", "value": "[ryanlink@${{ steps.version.outputs.new_version }}](https://www.npmjs.com/package/ryanlink/v/${{ steps.version.outputs.new_version }})", "inline": true },
                { "name": "Release", "value": "[View on GitHub](https://github.com/ryanwtf7/ryanlink/releases/tag/v${{ steps.version.outputs.new_version }})", "inline": true }
              ],
              "footer": { "text": "Automatic Release Workflow" },
              "timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            }]
          }
          EOF
          )
          
          curl -H "Content-Type: application/json" -X POST -d "$PAYLOAD" "${{ secrets.WEBHOOK }}"
